# Run with `dart run ffigen --config ffigen.yaml`.
name: ThanPkgLinuxPlugin
description: |
  Bindings for `src/than_pkg_linux.h`.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
output: "lib/than_pkg_linux_bindings_generated.dart"
headers:
  entry-points:
    - "linux/include/than_pkg_linux/than_pkg_linux_plugin.h"
  include-directives:
    - "linux/include/than_pkg_linux/than_pkg_linux_plugin.h"

ffi-native:
comments:
  style: any
  length: full
ignore-source-errors: true
