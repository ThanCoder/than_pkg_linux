name: than_pkg_linux
description: "A new Flutter plugin project."
version: 0.0.1
homepage: https://github.com/ThanCoder/than_pkg_linux.git
repository: https://github.com/ThanCoder/than_pkg_linux.git

environment:
  sdk: ^3.12.0
  flutter: '>=3.3.0'

dependencies:
  ffi: ^2.2.0
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: ThanPkgLinuxPlugin
